<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>叙事幻镜 · 多类型互动小说</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="story-header">
        <div class="story-title" id="storyTitle">叙事幻镜</div>
        <div class="story-meta">
            <span>📖 多类型 · 多选择 · 多结局 </span>
            <span class="tag">✨ 沉浸式互动小说</span>
        </div>
    </div>
    <div class="story-text" id="storyText">
        加载故事中，请稍候...
    </div>
    <div class="options-area" id="optionsArea">
        <!-- 动态选项按钮会渲染在此 -->
    </div>
    <div class="action-bar">
        <button class="action-btn" id="restartBtn">🔄 重来一次</button>
        <button class="action-btn" id="resetGameBtn">📖 选择其他故事</button>
    </div>
    <footer>✨ 每一次选择，都在书写你的专属小说</footer>
</div>
<!-- 自定义确认弹窗 -->
<div id="customConfirm" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-message" id="confirmMessage"></div>
        <div class="modal-buttons">
            <button class="modal-btn" id="confirmCancel">取消</button>
            <button class="modal-btn confirm" id="confirmOk">确定</button>
        </div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
